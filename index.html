<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin By Kalla</title>
  <meta name="description" content="Licensed Esthetician specializing in lymphatic drainage & sculpting facial massage. Book your experience today." />
  <meta property="og:title" content="Skin By Kalla" />
  <meta property="og:description" content="Licensed Esthetician specializing in lymphatic drainage & sculpting facial massage. Book your experience today." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f0eb;
      --surface: #ede7e0;
      --border: #d9d0c7;
      --border-btn: #b0a49c;
      --text: #1a1210;
      --muted: #5c4f4b;
      --accent: #7d3f53;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2.5rem 1.5rem;
      position: relative;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      padding: 0 0 2rem;
      position: relative;
      z-index: 1;
    }

    /* Avatar */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 1px solid var(--border-btn);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar svg {
      width: 96px;
      height: 96px;
    }

    /* Name & role */
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .role {
      font-size: clamp(0.65rem, 2.5vw, 0.75rem);
      font-weight: 600;
      letter-spacing: clamp(0.1em, 1vw, 0.22em);
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    /* Instagram */
    .social {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .social-link {
      color: var(--muted);
      opacity: 0.7;
      transition: opacity 0.2s ease, color 0.2s ease;
      line-height: 0;
    }

    .social-link:hover {
      color: var(--accent);
      opacity: 1;
    }

    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.4rem, 3.5vw, 1.5rem);
      font-weight: 400;
      color: var(--accent);
      margin-bottom: 2.25rem;
    }

    /* Services */
    .services {
      margin-bottom: 2.25rem;
    }

    .services-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }

    .services-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.45rem;
    }

    .service-tag {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 0.3rem 0.7rem;
    }

    /* Buttons */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2.25rem;
    }

    .link-btn {
      display: block;
      width: 100%;
      padding: 1rem 1.5rem;
      border: 1px solid var(--border-btn);
      border-radius: 3px;
      background: transparent;
      color: var(--text);
      font-size: clamp(0.65rem, 2.5vw, 0.75rem);
      font-weight: 600;
      letter-spacing: clamp(0.1em, 1vw, 0.2em);
      text-transform: uppercase;
      text-decoration: none;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
    }

    .link-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(125, 63, 83, 0.06);
    }

    .link-btn:active {
      background: rgba(125, 63, 83, 0.12);
    }

    .ig-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    /* Specialty note */
    .specialty {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1rem;
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    .heart {
      color: var(--accent);
      font-size: 1.5rem;
      margin-bottom: 0.6rem;
    }

    footer {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    @media (max-width: 380px) {
      body {
        padding: 2rem 1.25rem;
      }
      .specialty {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
